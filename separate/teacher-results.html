<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media (max-width: 767px) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen flex">
    <div id="toast-root"></div>

    <!-- Student Detail Modal -->
    <div id="detail-modal"
        class="hidden fixed inset-0 z-[100] bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[1.5rem] md:rounded-[2rem] shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300"
            id="detail-modal-content">
            <!-- Modal Header -->
            <div
                class="p-6 md:p-8 border-b border-gray-100 flex justify-between items-start md:items-center bg-gray-50/50">
                <div>
                    <h3 class="text-xl md:text-2xl lg:text-3xl font-black text-gray-900 tracking-tight" id="modal-student-name">
                        Student Name</h3>
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 mt-2">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest" id="modal-student-id">ID:
                            12345</p>
                        <span class="hidden sm:inline text-gray-300">•</span>
                        <p
                            class="text-xs font-bold text-gray-500 flex items-center gap-1.5 bg-white border border-gray-200 px-3 py-1 rounded-md shadow-sm w-fit">
                            <i data-lucide="calendar" class="w-3.5 h-3.5"></i> <span id="modal-date-text">Unknown
                                Date</span>
                        </p>
                    </div>
                </div>
                <button onclick="closeModal()"
                    class="p-3 bg-white rounded-xl border border-gray-200 text-gray-400 hover:text-red-600 hover:bg-red-50 hover:border-red-200 shadow-sm transition-all active:scale-95 flex-shrink-0"><i
                        data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 md:p-8 overflow-y-auto flex-1 bg-white">
                <!-- Stats Grid -->
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 md:gap-4 mb-6 md:mb-8" id="modal-stats-grid">
                    <!-- Dynamic stats injected here -->
                </div>

                <!-- Question Breakdown -->
                <div>
                    <h4 class="font-black text-gray-900 text-xl mb-6 flex items-center gap-3">
                        <div class="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="list-checks"
                                class="w-6 h-6"></i></div> Detailed Analysis
                    </h4>
                    <div class="space-y-5" id="modal-q-breakdown">
                        <!-- Dynamic questions injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div
        class="fixed bottom-0 left-0 w-full h-16 bg-white border-t flex items-center justify-around md:relative md:w-72 md:h-screen md:border-r border-gray-100 md:flex-col md:justify-start md:pt-10 z-50">
        <div class="hidden md:block mb-10 px-8 w-full">
            <h1 class="text-3xl font-black text-indigo-600 flex items-center gap-3"><i data-lucide="shield-alert"
                    class="w-8 h-8"></i> EduGuard</h1>
            <div class="flex items-center gap-2 mt-4 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 w-max">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest font-black">TEACHER MODE</p>
            </div>
        </div>

        <div class="flex w-full md:flex-col md:gap-3 md:px-6">
            <button onclick="safeNavigate('teacher-dashboard.html')"
                class="flex flex-col md:flex-row items-center gap-4 px-5 py-3.5 rounded-2xl md:w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"><i
                    data-lucide="layout-dashboard" class="w-[22px] h-[22px]"></i> <span
                    class="text-[10px] md:text-sm tracking-wide">Dashboard</span></button>
            <button onclick="safeNavigate('create-exam.html')"
                class="flex flex-col md:flex-row items-center gap-4 px-5 py-3.5 rounded-2xl md:w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"><i
                    data-lucide="plus-circle" class="w-[22px] h-[22px]"></i> <span
                    class="text-[10px] md:text-sm tracking-wide">Create Exam</span></button>
        </div>

        <!-- Profile & Sign Out Bottom Section -->
        <div class="hidden md:flex mt-auto pb-10 w-full px-8 flex-col gap-4">
            <div
                class="flex items-center gap-3 text-[10px] font-black tracking-widest text-green-600 bg-green-50 px-4 py-3 rounded-xl border border-green-100 shadow-sm">
                <i data-lucide="wifi" class="w-4 h-4"></i> SYSTEM ONLINE
            </div>

            <div class="flex flex-col gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div id="profile-avatar"
                        class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-lg border border-indigo-200">
                        U
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p id="profile-name" class="font-black text-sm text-gray-900 truncate leading-tight">Loading...
                        </p>
                        <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase truncate mt-0.5">Teacher
                        </p>
                    </div>
                </div>
                <button onclick="showToast('Profile interface would open here in the full app.')"
                    class="w-full py-2.5 bg-white border border-gray-200 text-xs font-black tracking-widest uppercase text-gray-600 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all rounded-xl shadow-sm active:scale-95">
                    View Profile
                </button>
            </div>

            <button onclick="logout()"
                class="flex items-center gap-3 px-4 py-3 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-xl transition-all font-bold w-full group">
                <i data-lucide="log-out" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Sign Out
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 relative h-screen overflow-y-auto w-full p-6 md:p-10 max-w-6xl mx-auto pb-24 md:pb-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div class="flex items-center gap-5">
                <button onclick="safeNavigate('teacher-dashboard.html')"
                    class="p-4 bg-white border border-gray-200 hover:bg-gray-50 hover:text-indigo-600 rounded-2xl transition-all shadow-sm"><i
                        data-lucide="chevron-left" class="w-6 h-6"></i></button>
                <div>
                    <h2 class="text-2xl md:text-4xl font-black text-gray-900 tracking-tight">Submission Reports</h2>
                    <p id="total-count"
                        class="text-sm font-bold text-gray-500 mt-2 uppercase tracking-widest bg-gray-100 px-3 py-1 rounded-md w-fit border border-gray-200">
                        Loading...</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadResults()"
                    class="p-3 bg-white border border-gray-200 rounded-2xl text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-all shadow-sm active:scale-95"
                    title="Refresh Results">
                    <i data-lucide="refresh-ccw" class="w-[22px] h-[22px]"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] border border-gray-100 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[600px]">
                <thead class="bg-gray-50/80 border-b border-gray-100">
                    <tr>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Student Profile</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Submitted At</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Score</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Status</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase text-right">Details
                        </th>
                    </tr>
                </thead>
                <tbody id="results-body" class="divide-y divide-gray-50"></tbody>
            </table>
            </div>
        </div>
    </main>

    <script>
        let currentSubmissions = [];
        let currentExam = null;

        function showToast(msg, type = 'success') {
            const toastRoot = document.getElementById('toast-root');
            if (toastRoot) {
                toastRoot.innerHTML = `<div class="fixed top-6 right-6 z-[9999] p-4 rounded-2xl shadow-2xl ${type === 'error' ? 'bg-red-600' : 'bg-gray-900'} text-white text-sm font-semibold">${msg}</div>`;
                setTimeout(() => toastRoot.innerHTML = '', 3000);
            } else {
                alert(msg);
            }
        }

        function safeNavigate(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.warn(`Navigation to ${url} blocked by preview sandbox.`);
                showToast(`Navigation to ${url} blocked in preview. Please run locally.`, 'error');
            }
        }

        function logout() {
            sessionStorage.clear();
            safeNavigate('index.html');
        }

        function formatDate(dateString) {
            if (!dateString) return "Unknown Date";
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return "Unknown Date";
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return "Unknown Date";
            }
        }

        const API_BASE = "https://eduguard-2xfk.onrender.com/api";
        const examId = sessionStorage.getItem('view_exam_id');
        const user = JSON.parse(sessionStorage.getItem('eduguard_user'));

        if (user && user.role === 'teacher') {
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();
        } else {
            safeNavigate('index.html');
            document.getElementById('profile-name').innerText = 'Guest (Preview)';
            document.getElementById('profile-avatar').innerText = 'G';
        }

        if (!examId) {
            safeNavigate('teacher-dashboard.html');
        } else {
            loadResults();
        }

        async function loadResults() {
            try {
                const exRes = await fetch(`${API_BASE}/exams`);
                if (exRes.ok) {
                    const exams = await exRes.json();
                    currentExam = exams.find(e => String(e._id) === String(examId) || String(e.id) === String(examId));
                }

                const res = await fetch(`${API_BASE}/submissions/${examId}`);
                let fetchedSubs = await res.json();

                // Sort the submissions by date (newest first)
                fetchedSubs.sort((a, b) => new Date(b.date) - new Date(a.date));
                currentSubmissions = fetchedSubs;

                document.getElementById('total-count').innerText = `${currentSubmissions.length} Submissions`;
                document.getElementById('results-body').innerHTML = currentSubmissions.length === 0 ? `<tr><td colspan="5" class="p-10 text-center text-gray-500">No submissions found.</td></tr>` : currentSubmissions.map((s, index) => `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        <td class="p-6">
                            <p class="font-black text-gray-900 text-xl">${s.studentName}</p>
                            <p class="text-[10px] text-gray-400 font-mono font-bold mt-1 uppercase">ID: ${s.studentId}</p>
                        </td>
                        <td class="p-6">
                            <span class="flex items-center gap-2 bg-gray-50 w-fit px-3 py-1.5 rounded-lg border border-gray-100 text-gray-500 text-xs font-bold shadow-sm whitespace-nowrap"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${formatDate(s.date)}</span>
                        </td>
                        <td class="p-6 font-black text-3xl text-indigo-600">${s.score}%</td>
                        <td class="p-6">
                            <span class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm border ${s.passed ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}">${s.passed ? 'Pass' : 'Fail'}</span>
                            <div class="mt-2 text-[10px] font-bold flex items-center gap-1.5 ${s.shuffleCount > 0 ? 'text-orange-600' : 'text-gray-400'}">
                                <i data-lucide="${s.shuffleCount > 0 ? 'alert-triangle' : 'shield-check'}" class="w-3.5 h-3.5"></i> ${s.shuffleCount || 0} Tab Switches
                            </div>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="viewStudentDetails(${index})" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-black uppercase tracking-widest text-indigo-600 hover:border-indigo-300 hover:bg-indigo-50 hover:shadow-md transition-all shadow-sm active:scale-95">View Report</button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (error) {
                showToast("Failed to fetch results from the server.", "error");
            }
        }

        function viewStudentDetails(index) {
            const s = currentSubmissions[index];
            if (!s) return;

            // Populate Modal Headers
            document.getElementById('modal-student-name').innerText = s.studentName;
            document.getElementById('modal-student-id').innerText = `ID: ${s.studentId}`;
            document.getElementById('modal-date-text').innerText = `Submitted: ${formatDate(s.date)}`;

            // Process fully analyzed data inside `s.details`.
            const detailsArray = s.details || [];
            const totalQs = detailsArray.length;

            let answeredQs = 0;
            let correctQs = 0;
            let breakdownHtml = '';

            if (totalQs > 0) {
                breakdownHtml = detailsArray.map((q, qIdx) => {
                    const isAnswered = q.studentAnswerIndex !== undefined && q.studentAnswerIndex !== null;
                    const isCorrect = q.isCorrect;

                    if (isAnswered) answeredQs++;
                    if (isCorrect) correctQs++;

                    const studentAnsText = isAnswered && q.options && q.options[q.studentAnswerIndex] ? q.options[q.studentAnswerIndex] : 'Unanswered (Skipped)';
                    const correctAnsText = q.options && q.options[q.correctAnswerIndex] ? q.options[q.correctAnswerIndex] : 'Unknown';

                    // Fallback to fetch original question if swapped
                    let originalQ = null;
                    if (currentExam && currentExam.questions && currentExam.questions[qIdx]) {
                        originalQ = currentExam.questions[qIdx];
                    }

                    return `
                        <div class="p-5 rounded-2xl border ${isCorrect ? 'border-green-200 bg-green-50/50' : (!isAnswered ? 'border-gray-200 bg-gray-50/50' : 'border-red-200 bg-red-50/50')} relative mt-6 shadow-sm">
                            ${q.replaced ? `<span class="absolute -top-3 left-4 text-[10px] font-black uppercase tracking-widest bg-orange-100 text-orange-700 px-3 py-1 rounded-full border border-orange-200 shadow-sm flex items-center gap-1"><i data-lucide="refresh-cw" class="w-3 h-3"></i> AI Swapped Penalty</span>` : ''}
                            
                            ${q.replaced && originalQ ? `
                                <div class="mb-4 pb-4 border-b border-gray-200/60 opacity-60">
                                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1 line-through flex items-center gap-1"><i data-lucide="eye-off" class="w-3 h-3"></i> Original Question (Skipped via tab switch)</p>
                                    <p class="text-sm text-gray-600 line-through">${originalQ.q}</p>
                                </div>
                            ` : ''}

                            <p class="font-bold text-gray-900 mb-4 pr-24"><span class="text-gray-400 mr-2">Q${qIdx + 1}.</span> ${q.question}</p>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm bg-white p-4 rounded-xl border ${isCorrect ? 'border-green-100' : (!isAnswered ? 'border-gray-200' : 'border-red-100')}">
                                <div class="flex items-start gap-3">
                                    <div class="mt-0.5"><i data-lucide="${isCorrect ? 'check-circle-2' : (!isAnswered ? 'help-circle' : 'x-circle')}" class="w-5 h-5 ${isCorrect ? 'text-green-500' : (!isAnswered ? 'text-gray-400' : 'text-red-500')}"></i></div>
                                    <div>
                                        <span class="block text-[10px] font-black uppercase text-gray-400 tracking-widest mb-0.5">Student's Answer</span>
                                        <span class="font-bold ${isCorrect ? 'text-green-700' : (!isAnswered ? 'text-gray-500 italic' : 'text-red-700')}">${studentAnsText}</span>
                                    </div>
                                </div>
                                ${!isCorrect ? `
                                <div class="flex items-start gap-3">
                                    <div class="mt-0.5"><i data-lucide="check-circle-2" class="w-5 h-5 text-green-500"></i></div>
                                    <div>
                                        <span class="block text-[10px] font-black uppercase text-gray-400 tracking-widest mb-0.5">Correct Answer</span>
                                        <span class="font-bold text-green-700">${correctAnsText}</span>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                breakdownHtml = `
                    <div class="p-10 text-center bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                        <div class="flex justify-center mb-4"><i data-lucide="alert-circle" class="w-10 h-10 text-gray-400"></i></div>
                        <p class="text-gray-700 font-bold mb-2 text-lg">Detailed breakdown not available</p>
                        <p class="text-sm text-gray-500 max-w-md mx-auto">The question data could not be retrieved from the server.</p>
                    </div>`;
            }

            const wrongQs = answeredQs - correctQs;
            const unansweredQs = totalQs > 0 ? (totalQs - answeredQs) : 0;

            // Populate Modal Stats
            document.getElementById('modal-stats-grid').innerHTML = `
                <div class="bg-gray-50 p-4 md:p-5 rounded-2xl border border-gray-100 text-center shadow-sm">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Score</p>
                    <p class="text-3xl font-black text-indigo-600">${s.score}%</p>
                </div>
                <div class="bg-green-50 p-4 md:p-5 rounded-2xl border border-green-100 text-center shadow-sm">
                    <p class="text-[10px] font-black text-green-600/70 uppercase tracking-widest mb-1">Correct</p>
                    <p class="text-3xl font-black text-green-700">${correctQs}</p>
                </div>
                <div class="bg-red-50 p-4 md:p-5 rounded-2xl border border-red-100 text-center shadow-sm">
                    <p class="text-[10px] font-black text-red-600/70 uppercase tracking-widest mb-1">Incorrect</p>
                    <p class="text-3xl font-black text-red-700">${wrongQs}</p>
                </div>
                <div class="bg-gray-100 p-4 md:p-5 rounded-2xl border border-gray-200 text-center shadow-sm">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Unanswered</p>
                    <p class="text-3xl font-black text-gray-700">${unansweredQs}</p>
                </div>
                <div class="bg-orange-50 p-4 md:p-5 rounded-2xl border border-orange-100 text-center shadow-sm relative">
                    <p class="text-[10px] font-black text-orange-600/70 uppercase tracking-widest mb-1">Tab Switches</p>
                    <p class="text-3xl font-black text-orange-700">${s.shuffleCount || 0}</p>
                    ${(s.shuffleCount || 0) > 0 ? `<div class="absolute -top-2 -right-2 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-md animate-bounce"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i></div>` : ''}
                </div>
            `;

            // Populate Questions
            document.getElementById('modal-q-breakdown').innerHTML = breakdownHtml;

            // Show Modal with Animation
            const modal = document.getElementById('detail-modal');
            const modalContent = document.getElementById('detail-modal-content');

            modal.classList.remove('hidden');
            void modal.offsetWidth; // Force browser reflow to enable transition
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');

            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            const modalContent = document.getElementById('detail-modal-content');

            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Initialize static icons immediately on page load
        lucide.createIcons();
    </script>
</body>

</html>
