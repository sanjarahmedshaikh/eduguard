<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard - Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen flex">
    <div id="toast-root"></div>

    <!-- Sidebar -->
    <div id="sidebar" onclick="handleSidebarClick(event)"
        class="fixed bottom-0 left-0 right-0 h-[4.5rem] md:h-screen bg-white border-t md:border-t-0 md:border-r border-gray-100 flex flex-row md:flex-col justify-around md:justify-start pt-0 md:pt-6 z-[100] md:z-50 overflow-visible md:overflow-y-auto flex-shrink-0 w-full md:w-72 transition-all duration-300 md:relative">
        


        <div onclick="toggleSidebar(event)" class="logo-container hidden md:flex cursor-pointer mb-10 px-8 w-full pt-2 flex-col items-start">
            <h1 class="text-3xl font-black text-indigo-600 flex items-center justify-start gap-3">
                <i data-lucide="shield-alert" class="w-8 h-8 flex-shrink-0 text-indigo-600"></i>
                <span class="hidden md:inline-block">EduGuard</span>
            </h1>
            <div class="hidden-compact flex items-center gap-2 mt-4 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 w-max">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest font-black">TEACHER MODE</p>
            </div>
        </div>

        <div class="nav-container contents md:flex md:flex-col md:gap-3 md:px-6 w-full md:items-stretch">
            <!-- Active Link Example -->
            <button onclick="sidebarNavigate('teacher-dashboard.html')" class="flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-4 p-2 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-auto md:w-full transition-all text-indigo-700 bg-indigo-50/80 font-black shadow-sm border border-indigo-100"
                title="Dashboard">
                <i data-lucide="layout-dashboard" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">Dashboard</span>
            </button>
            <!-- Inactive Link Example -->
            <button onclick="sidebarNavigate('create-exam.html')" class="flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-4 p-2 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-auto md:w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"
                title="Create Exam">
                <i data-lucide="plus-circle" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">Create Exam</span>
            </button>
        </div>

        <!-- Profile & Sign Out Bottom Section -->
        <div class="bottom-container contents md:flex md:mt-auto md:pb-10 w-full md:px-8 md:flex-col md:gap-4 md:items-stretch">
            <div
                class="hidden md:flex items-center justify-start gap-3 text-[10px] font-black tracking-widest text-green-600 bg-green-50 p-2.5 md:px-4 md:py-3 rounded-xl border border-green-100 shadow-sm w-full"
                title="System Online">
                <i data-lucide="wifi" class="w-4 h-4 flex-shrink-0 text-green-600"></i>
                <span class="hidden md:inline-block">SYSTEM ONLINE</span>
            </div>

            <div class="hidden md:flex flex-col gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm w-full items-stretch">
                <div class="profile-box flex items-center gap-3 overflow-hidden justify-center md:justify-start">
                    <div id="profile-avatar" onclick="sidebarNavigate('profile.html')"
                        class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-lg border border-indigo-200 cursor-pointer md:cursor-default"
                        title="View Profile">
                        J
                    </div>
                    <div class="flex-1 overflow-hidden hidden-compact">
                        <p class="font-black text-sm text-gray-900 truncate leading-tight">Jane Doe</p>
                        <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase truncate mt-0.5">Teacher</p>
                    </div>
                </div>
                <button onclick="sidebarNavigate('profile.html')"
                    class="hidden md:block w-full py-2.5 bg-white border border-gray-200 text-xs font-black tracking-widest uppercase text-gray-600 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all rounded-xl shadow-sm active:scale-95">
                    View Profile
                </button>
            </div>

            <button onclick="sidebarNavigate('profile.html')" class="md:hidden flex flex-col items-center justify-center gap-1 p-2 w-auto transition-all text-gray-500 hover:text-indigo-600 font-bold" title="Profile">
                <i data-lucide="user" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">Profile</span>
            </button>
            <button onclick="logout(); event.stopPropagation();" class="hidden md:flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 p-2 md:px-4 md:py-3 text-gray-500 hover:text-red-600 md:hover:bg-red-50 border border-transparent md:hover:border-red-100 rounded-xl transition-all font-bold w-auto md:w-full group"
                title="Sign Out">
                <i data-lucide="log-out" class="w-5 h-5 flex-shrink-0 group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden md:inline-block">Sign Out</span>
            </button>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="collapseSidebar()"></div>

    <script>
        function toggleSidebar(e) {
            if (e) e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('expanded');
        }

        function handleSidebarClick(e) {
            // Mobile bottom nav doesn't need to expand
        }

        function collapseSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('expanded');
        }

        function showToast(msg) {
            const toastRoot = document.getElementById('toast-root');
            if (toastRoot) {
                toastRoot.innerHTML = `<div class="fixed top-6 right-6 z-[9999] p-4 rounded-2xl shadow-2xl bg-gray-900 text-white text-sm font-semibold">${msg}</div>`;
                setTimeout(() => toastRoot.innerHTML = '', 3000);
            }
        }

        function safeNavigate(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.warn(`Navigation to ${url} blocked by preview sandbox.`);
                showToast(`Navigation to ${url} blocked in preview. Please run locally.`);
            }
        }

        function sidebarNavigate(url) {
            safeNavigate(url);
        }

        function logout() {
            sessionStorage.clear();
            safeNavigate('index.html');
        }

        

        lucide.createIcons();
    </script>
</body>
</html>
