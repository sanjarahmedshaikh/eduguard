<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard - Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media (max-width: 767px) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen flex">
    <div id="sidebar"
        class="h-screen bg-white border-r border-gray-100 flex flex-col justify-start pt-6 z-50 overflow-y-auto flex-shrink-0 w-16 md:w-72 transition-all duration-300">
        <div class="mb-8 md:mb-10 px-2 md:px-8 w-full pt-2 flex flex-col items-center md:items-start">
            <h1 class="text-3xl font-black text-indigo-600 flex items-center justify-center md:justify-start gap-3">
                <i data-lucide="shield-alert" class="w-8 h-8 flex-shrink-0 text-indigo-600"></i>
                <span class="hidden md:block">EduGuard</span>
            </h1>
            <div class="hidden md:flex items-center gap-2 mt-4 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 w-max">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest font-black">TEACHER MODE</p>
            </div>
        </div>

        <div class="flex flex-col gap-3 px-2 md:px-6 w-full items-center md:items-stretch">
            <!-- Active Link Example -->
            <button class="flex flex-row items-center justify-center md:justify-start gap-4 p-3 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-12 md:w-full transition-all text-indigo-700 bg-indigo-50/80 font-black shadow-sm border border-indigo-100"
                title="Dashboard">
                <i data-lucide="layout-dashboard" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-sm tracking-wide hidden md:inline">Dashboard</span>
            </button>
            <!-- Inactive Link Example -->
            <button class="flex flex-row items-center justify-center md:justify-start gap-4 p-3 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-12 md:w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"
                title="Create Exam">
                <i data-lucide="plus-circle" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-sm tracking-wide hidden md:inline">Create Exam</span>
            </button>
        </div>

        <!-- Profile & Sign Out Bottom Section -->
        <div class="flex mt-auto pb-6 md:pb-10 w-full px-2 md:px-8 flex-col gap-4 items-center md:items-stretch">
            <div
                class="flex items-center justify-center md:justify-start gap-3 text-[10px] font-black tracking-widest text-green-600 bg-green-50 p-3 md:px-4 md:py-3 rounded-xl border border-green-100 shadow-sm w-12 md:w-full"
                title="System Online">
                <i data-lucide="wifi" class="w-4 h-4 flex-shrink-0 text-green-600"></i>
                <span class="hidden md:inline">SYSTEM ONLINE</span>
            </div>

            <div class="flex flex-col gap-3 p-0 md:p-4 bg-transparent md:bg-gray-50 rounded-2xl border-0 md:border md:border-gray-100 md:shadow-sm w-full items-center md:items-stretch">
                <div class="flex items-center gap-3 overflow-hidden justify-center md:justify-start">
                    <div id="profile-avatar" onclick="showToast('Profile interface would open here in the full app.')"
                        class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-lg border border-indigo-200 cursor-pointer md:cursor-default"
                        title="View Profile">
                        J
                    </div>
                    <div class="flex-1 overflow-hidden hidden md:block">
                        <p class="font-black text-sm text-gray-900 truncate leading-tight">Jane Doe</p>
                        <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase truncate mt-0.5">Teacher</p>
                    </div>
                </div>
                <button onclick="showToast('Profile interface would open here in the full app.')"
                    class="hidden md:block w-full py-2.5 bg-white border border-gray-200 text-xs font-black tracking-widest uppercase text-gray-600 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all rounded-xl shadow-sm active:scale-95">
                    View Profile
                </button>
            </div>

            <button class="flex items-center justify-center md:justify-start gap-3 p-3 md:px-4 md:py-3 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-xl transition-all font-bold w-12 md:w-full group"
                title="Sign Out">
                <i data-lucide="log-out" class="w-5 h-5 flex-shrink-0 group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden md:inline">Sign Out</span>
            </button>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
