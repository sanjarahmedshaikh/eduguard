<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media (max-width: 767px) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
        }
        #sidebar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                height: 100dvh !important;
            }
            #sidebar:not(.expanded) {
                width: 4rem; /* w-16 */
                box-shadow: none;
            }
            #sidebar:not(.expanded) .hidden-compact {
                display: none !important;
            }
            #sidebar:not(.expanded) .items-center-compact {
                align-items: center !important;
                justify-content: center !important;
                width: 3rem !important; /* w-12 */
                padding: 0.75rem !important;
            }
            #sidebar.expanded {
                width: 18rem; /* w-72 */
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.15);
            }
            #sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(4px);
                z-index: 90;
            }
            #sidebar.expanded ~ #sidebar-overlay {
                display: block;
            }
            main {
                margin-left: 4rem !important;
                width: calc(100% - 4rem) !important;
            }
            .logo-container {
                display: flex;
            }
            #sidebar:not(.expanded) .logo-container {
                align-items: center !important;
                justify-content: center !important;
                padding-left: 0 !important;
                padding-right: 0 !important;
            }
            #sidebar.expanded .logo-container {
                align-items: flex-start !important;
                padding-left: 1.5rem !important; /* px-6 */
                padding-right: 1.5rem !important;
            }
            #sidebar:not(.expanded) .nav-container {
                padding-left: 0.5rem !important; /* px-2 */
                padding-right: 0.5rem !important;
            }
            #sidebar.expanded .nav-container {
                padding-left: 1.5rem !important; /* px-6 */
                padding-right: 1.5rem !important;
            }
            #sidebar:not(.expanded) .bottom-container {
                padding-left: 0.5rem !important; /* px-2 */
                padding-right: 0.5rem !important;
                align-items: center !important;
            }
            #sidebar.expanded .bottom-container {
                padding-left: 1.5rem !important; /* px-6 */
                padding-right: 1.5rem !important;
                align-items: stretch !important;
            }
            #sidebar:not(.expanded) .profile-box {
                justify-content: center !important;
            }
            #sidebar.expanded .profile-box {
                justify-content: flex-start !important;
            }
        }
        @media (min-width: 768px) {
            #sidebar {
                position: relative;
                width: 18rem; /* w-72 */
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen flex">
    <div id="toast-root"></div>

    <!-- Sidebar -->
    <div id="sidebar" onclick="handleSidebarClick(event)"
        class="h-screen bg-white border-r border-gray-100 flex flex-col justify-start pt-3 md:pt-6 z-50 overflow-y-auto flex-shrink-0 w-16 md:w-72 transition-all duration-300 relative">
        


        <div onclick="toggleSidebar(event)" class="logo-container cursor-pointer mb-4 md:mb-10 px-2 md:px-8 w-full pt-2 flex flex-col items-center md:items-start">
            <h1 class="text-3xl font-black text-indigo-600 flex items-center justify-start gap-3">
                <i data-lucide="shield-alert" class="w-8 h-8 flex-shrink-0 text-indigo-600"></i>
                <span class="hidden-compact">EduGuard</span>
            </h1>
            <div class="hidden-compact flex items-center gap-2 mt-4 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 w-max">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest font-black">TEACHER MODE</p>
            </div>
        </div>

        <div class="nav-container flex flex-col gap-2 md:gap-3 px-2 md:px-6 w-full items-center md:items-stretch">
            <button onclick="sidebarNavigate('teacher-dashboard.html')"
                class="items-center-compact flex flex-row items-center justify-start gap-4 p-2.5 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-full transition-all text-indigo-700 bg-indigo-50/80 font-black shadow-sm border border-indigo-100"
                title="Dashboard">
                <i data-lucide="layout-dashboard" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-sm tracking-wide hidden-compact">Dashboard</span>
            </button>
            <button onclick="sidebarNavigate('create-exam.html')"
                class="items-center-compact flex flex-row items-center justify-start gap-4 p-2.5 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"
                title="Create Exam">
                <i data-lucide="plus-circle" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-sm tracking-wide hidden-compact">Create Exam</span>
            </button>
        </div>

        <!-- Profile & Sign Out Bottom Section -->
        <div class="bottom-container flex mt-auto pb-4 md:pb-10 w-full px-2 md:px-8 flex-col gap-3 md:gap-4 items-center md:items-stretch">
            <div
                class="items-center-compact flex items-center justify-start gap-3 text-[10px] font-black tracking-widest text-green-600 bg-green-50 p-2.5 md:px-4 md:py-3 rounded-xl border border-green-100 shadow-sm w-full"
                title="System Online">
                <i data-lucide="wifi" class="w-4 h-4 flex-shrink-0 text-green-600"></i>
                <span class="hidden-compact">SYSTEM ONLINE</span>
            </div>

            <div class="flex flex-col gap-3 p-0 md:p-4 bg-transparent md:bg-gray-50 rounded-2xl border-0 md:border md:border-gray-100 md:shadow-sm w-full items-center md:items-stretch">
                <div class="profile-box flex items-center gap-3 overflow-hidden justify-center md:justify-start">
                    <div id="profile-avatar" onclick="handleProfileClick(event)"
                        class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-lg border border-indigo-200 cursor-pointer md:cursor-default"
                        title="View Profile">
                        U
                    </div>
                    <div class="flex-1 overflow-hidden hidden-compact">
                        <p id="profile-name" class="font-black text-sm text-gray-900 truncate leading-tight">Loading...</p>
                        <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase truncate mt-0.5">Teacher
                        </p>
                    </div>
                </div>
                <button onclick="handleProfileClick(event)"
                    class="hidden-compact w-full py-2.5 bg-white border border-gray-200 text-xs font-black tracking-widest uppercase text-gray-600 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all rounded-xl shadow-sm active:scale-95">
                    View Profile
                </button>
            </div>

            <button onclick="logout(); event.stopPropagation();"
                class="items-center-compact flex items-center justify-start gap-3 p-2.5 md:px-4 md:py-3 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-xl transition-all font-bold w-full group"
                title="Sign Out">
                <i data-lucide="log-out" class="w-5 h-5 flex-shrink-0 group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden-compact">Sign Out</span>
            </button>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="collapseSidebar()"></div>

    <!-- Main Content -->
    <main class="flex-1 relative h-screen overflow-y-auto w-full p-4 md:p-10 pb-8 max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-8">
            <div>
                <h2 class="text-2xl md:text-4xl font-black text-gray-900 tracking-tight">Dashboard Overview</h2>
            </div>
            <div class="flex flex-wrap items-center gap-3 md:gap-4">
                <button onclick="fetchExams()"
                    class="p-3 bg-white border border-gray-200 rounded-2xl text-gray-500 hover:text-indigo-600 transition-all shadow-sm active:scale-95"><i
                        data-lucide="refresh-ccw" class="w-[22px] h-[22px]"></i></button>
                <button onclick="safeNavigate('create-exam.html')"
                    class="px-6 py-3 bg-gray-900 text-white font-bold rounded-2xl shadow-lg hover:bg-black transition-all active:scale-95 flex items-center gap-2"><i
                        data-lucide="plus" class="w-5 h-5"></i> New Exam</button>
            </div>
        </header>

        <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 mb-6 md:mb-8"></div>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 md:p-8 border-b border-gray-100 bg-white">
                <h3 class="font-black text-2xl text-gray-800 tracking-tight">Your Assessments</h3>
            </div>
            <div id="exam-list" class="divide-y divide-gray-50"></div>
        </div>
    </main>

    <script>
        function safeNavigate(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.warn(`Navigation to ${url} blocked by preview sandbox.`);
                showToast(`Navigation to ${url} blocked in preview. Please run locally.`);
            }
        }

        function sidebarNavigate(url) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                return;
            }
            safeNavigate(url);
        }

        function toggleSidebar(e) {
            if (e) e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('expanded');
        }

        function handleSidebarClick(e) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                e.stopPropagation();
            }
        }

        function collapseSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('expanded');
        }

        const API_BASE = "https://eduguard-2xfk.onrender.com/api";
        const user = JSON.parse(sessionStorage.getItem('eduguard_user'));

        if (!user || user.role !== 'teacher') {
            safeNavigate('index.html');
            document.getElementById('profile-name').innerText = "Guest (Preview)";
            document.getElementById('profile-avatar').innerText = "G";
        } else {
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();
        }

        function logout() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                return;
            }
            sessionStorage.clear();
            safeNavigate('index.html');
        }

        function handleProfileClick(e) {
            if (e) e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                return;
            }
            showToast('Profile interface would open here in the full app.');
        }
        function showToast(msg, type = 'success') {
            const toastRoot = document.getElementById('toast-root');
            if (toastRoot) {
                toastRoot.innerHTML = `<div class="fixed top-6 right-6 z-[9999] p-4 rounded-2xl shadow-2xl ${type === 'error' ? 'bg-red-600' : 'bg-gray-900'} text-white text-sm font-semibold">${msg}</div>`;
                setTimeout(() => toastRoot.innerHTML = '', 3000);
            }
        }

        async function fetchExams() {
            try {
                const res = await fetch(`${API_BASE}/exams`);
                const exams = await res.json();
                renderStats(exams);
                renderList(exams);
            } catch (e) { showToast("Server error fetching exams", "error"); }
        }

        function renderStats(exams) {
            const pub = exams.filter(e => e.status === 'Published').length;
            const subs = exams.reduce((acc, curr) => acc + (curr.studentsCount || 0), 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100"><p class="text-[10px] text-gray-400 uppercase tracking-widest font-black">Published</p><span class="text-6xl font-black text-gray-900">${pub}</span></div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100"><p class="text-[10px] text-gray-400 uppercase tracking-widest font-black">Drafts</p><span class="text-6xl font-black text-gray-900">${exams.length - pub}</span></div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100"><p class="text-[10px] text-gray-400 uppercase tracking-widest font-black">Submissions</p><span class="text-6xl font-black text-gray-900">${subs}</span></div>
            `;
        }

        function renderList(exams) {
            if (exams.length === 0) return document.getElementById('exam-list').innerHTML = '<p class="p-8 text-gray-500">No exams created yet.</p>';
            document.getElementById('exam-list').innerHTML = exams.map(e => {
                const isVisible = e.showExpiredToStudents !== false; // Defaults to true if missing
                return `
                <div class="p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between hover:bg-indigo-50/30 gap-6">
                    <div>
                        <p class="font-black text-gray-900 text-xl">${e.title}</p>
                        <span class="text-xs font-bold text-gray-500 uppercase mt-2 block">${e.status} • ${e.studentsCount || 0} Subs</span>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        ${e.validUntil ? `
                            <button id="toggle-${e._id}" onclick="toggleVisibility('${e._id}', ${isVisible})" class="px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2 border transition-all ${isVisible ? 'bg-green-50 text-green-700 border-green-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200' : 'bg-gray-100 text-gray-500 border-gray-200 hover:bg-green-50 hover:text-green-700 hover:border-green-200'}" title="Toggle whether expired exams are visible to students">
                                <i data-lucide="${isVisible ? 'eye' : 'eye-off'}" class="w-4 h-4"></i>
                                ${isVisible ? 'Visible if Expired' : 'Hidden if Expired'}
                            </button>
                        ` : ''}
                        <button onclick="viewResults('${e._id}')" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-black text-gray-700 hover:text-indigo-700 shadow-sm">Results</button>
                        <button onclick="editExam('${e._id}')" class="p-3 bg-white border border-gray-200 rounded-xl text-gray-500 hover:text-blue-600 shadow-sm"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                        <button onclick="deleteExam('${e._id}')" class="p-3 bg-white border border-gray-200 rounded-xl text-gray-500 hover:text-red-600 shadow-sm"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        async function toggleVisibility(id, currentState) {
            const newState = !currentState;

            // 1. Optimistic UI Update: Instantly change the button's appearance
            const btn = document.getElementById(`toggle-${id}`);
            if (btn) {
                btn.onclick = () => toggleVisibility(id, newState); // Update onclick handler
                if (newState) {
                    btn.className = "px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2 border transition-all bg-green-50 text-green-700 border-green-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200";
                    btn.innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i> Visible if Expired`;
                } else {
                    btn.className = "px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2 border transition-all bg-gray-100 text-gray-500 border-gray-200 hover:bg-green-50 hover:text-green-700 hover:border-green-200";
                    btn.innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i> Hidden if Expired`;
                }
                lucide.createIcons();
            }

            // 2. Silently update the database in the background
            try {
                const res = await fetch(`${API_BASE}/exams`);
                const exams = await res.json();
                const ex = exams.find(e => e._id === id);
                if (ex) {
                    ex.showExpiredToStudents = newState;
                    await fetch(`${API_BASE}/exams`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(ex)
                    });
                    showToast(`Exam ${newState ? 'will be visible' : 'is now hidden'} to students when expired.`);
                }
            } catch (e) {
                showToast("Failed to update visibility on server.", "error");
                fetchExams(); // Revert to reality if it failed
            }
        }

        async function deleteExam(id) {
            if (!confirm("Delete this exam?")) return;
            await fetch(`${API_BASE}/exams/${id}`, { method: 'DELETE' });
            fetchExams();
        }

        function viewResults(id) { sessionStorage.setItem('view_exam_id', id); safeNavigate('teacher-results.html'); }

        async function editExam(id) {
            const res = await fetch(`${API_BASE}/exams`);
            const exams = await res.json();
            const ex = exams.find(e => e._id === id);
            sessionStorage.setItem('pendingExam', JSON.stringify(ex));
            safeNavigate('review-exam.html');
        }

        fetchExams(); lucide.createIcons();
    </script>
</body>

</html>
