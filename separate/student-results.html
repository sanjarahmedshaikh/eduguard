<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen flex">
    <div id="toast-root"></div>

    <!-- Sidebar -->
    <div id="sidebar" onclick="handleSidebarClick(event)"
        class="fixed bottom-0 left-0 right-0 h-[4.5rem] md:h-screen bg-white border-t md:border-t-0 md:border-r border-gray-100 flex flex-row md:flex-col justify-around md:justify-start pt-0 md:pt-6 z-[100] md:z-50 overflow-visible md:overflow-y-auto flex-shrink-0 w-full md:w-72 transition-all duration-300 md:relative">
        


        <div onclick="toggleSidebar(event)" class="logo-container hidden md:flex cursor-pointer mb-10 px-8 w-full pt-2 flex-col items-start">
            <h1 class="text-3xl font-black text-indigo-600 flex items-center justify-start gap-3">
                <i data-lucide="shield-alert" class="w-8 h-8 flex-shrink-0 text-indigo-600"></i>
                <span class="hidden md:inline-block">EduGuard</span>
            </h1>
            <div class="hidden-compact flex items-center gap-2 mt-4 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 w-max">
                <div class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest font-black">STUDENT MODE</p>
            </div>
        </div>

        <div class="nav-container contents md:flex md:flex-col md:gap-3 md:px-6 w-full md:items-stretch">
            <button onclick="sidebarNavigate('student-dashboard.html')"
                class="flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-4 p-2 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-auto md:w-full transition-all text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-bold"
                title="Assessments">
                <i data-lucide="book-open" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">Assessments</span>
            </button>
            <button onclick="sidebarNavigate('student-results.html')"
                class="flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-4 p-2 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl w-auto md:w-full transition-all text-orange-700 bg-orange-50/80 font-black shadow-sm border border-orange-100"
                title="My History">
                <i data-lucide="history" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">My History</span>
            </button>
        </div>

        <!-- Profile & Sign Out Bottom Section -->
        <div class="bottom-container contents md:flex md:mt-auto md:pb-10 w-full md:px-8 md:flex-col md:gap-4 md:items-stretch">
            <div
                class="hidden md:flex items-center justify-start gap-3 text-[10px] font-black tracking-widest text-green-600 bg-green-50 p-2.5 md:px-4 md:py-3 rounded-xl border border-green-100 shadow-sm w-full"
                title="System Online">
                <i data-lucide="wifi" class="w-4 h-4 flex-shrink-0 text-green-600"></i>
                <span class="hidden md:inline-block">SYSTEM ONLINE</span>
            </div>

            <div class="hidden md:flex flex-col gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm w-full items-stretch">
                <div class="profile-box flex items-center gap-3 overflow-hidden justify-center md:justify-start">
                    <div id="profile-avatar" onclick="sidebarNavigate('profile.html')"
                        class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-lg border border-indigo-200 cursor-pointer md:cursor-default"
                        title="View Profile">
                        U
                    </div>
                    <div class="flex-1 overflow-hidden hidden-compact">
                        <p id="profile-name-sidebar" class="font-black text-sm text-gray-900 truncate leading-tight">
                            Loading...</p>
                        <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase truncate mt-0.5">Student
                        </p>
                    </div>
                </div>
                <button onclick="sidebarNavigate('profile.html')"
                    class="hidden md:block w-full py-2.5 bg-white border border-gray-200 text-xs font-black tracking-widest uppercase text-gray-600 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all rounded-xl shadow-sm active:scale-95">
                    View Profile
                </button>
            </div>

            <button onclick="sidebarNavigate('profile.html')" class="md:hidden flex flex-col items-center justify-center gap-1 p-2 w-auto transition-all text-gray-500 hover:text-indigo-600 font-bold" title="Profile">
                <i data-lucide="user" class="w-[22px] h-[22px] flex-shrink-0"></i>
                <span class="text-[10px] md:text-sm tracking-wide block md:inline-block mt-1 md:mt-0">Profile</span>
            </button>
            <button onclick="logout(); event.stopPropagation();"
                class="hidden md:flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 p-2 md:px-4 md:py-3 text-gray-500 hover:text-red-600 md:hover:bg-red-50 border border-transparent md:hover:border-red-100 rounded-xl transition-all font-bold w-auto md:w-full group"
                title="Sign Out">
                <i data-lucide="log-out" class="w-5 h-5 flex-shrink-0 group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden md:inline-block">Sign Out</span>
            </button>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="collapseSidebar()"></div>

    <!-- Main Content -->
    <main class="flex-1 relative h-screen overflow-y-auto w-full p-4 md:p-10 pb-8 max-w-6xl mx-auto">
        <h2 class="text-2xl md:text-4xl font-black tracking-tight mb-6 md:mb-8 text-gray-900 flex items-center gap-3 md:gap-4">
            <div class="bg-indigo-100 text-indigo-600 p-3 rounded-2xl"><i data-lucide="history" class="w-8 h-8"></i>
            </div> My History
        </h2>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] border border-gray-100 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[500px]">
                <thead class="bg-gray-50/80 border-b border-gray-100">
                    <tr>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Assessment</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase">Submitted On</th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase text-center">Answered
                        </th>
                        <th class="p-6 font-black text-gray-400 text-xs tracking-widest uppercase text-center">
                            Unanswered</th>
                    </tr>
                </thead>
                <tbody id="res-body" class="divide-y divide-gray-50"></tbody>
            </table>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar(e) {
            if (e) e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('expanded');
        }

        function handleSidebarClick(e) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                e.stopPropagation();
            }
        }

        function collapseSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('expanded');
        }

        function showToast(msg) {
            const toastRoot = document.getElementById('toast-root');
            if (toastRoot) {
                toastRoot.innerHTML = `<div class="fixed top-6 right-6 z-[9999] p-4 rounded-2xl shadow-2xl bg-gray-900 text-white text-sm font-semibold">${msg}</div>`;
                setTimeout(() => toastRoot.innerHTML = '', 3000);
            }
        }

        function safeNavigate(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.warn(`Navigation to ${url} blocked by preview sandbox.`);
                showToast(`Navigation to ${url} blocked in preview. Please run locally.`);
            }
        }

        function sidebarNavigate(url) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                return;
            }
            safeNavigate(url);
        }

        function logout() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('expanded')) {
                sidebar.classList.add('expanded');
                return;
            }
            sessionStorage.clear();
            safeNavigate('index.html');
        }

        

        const API_BASE = "https://eduguard-2xfk.onrender.com/api";
        const user = JSON.parse(sessionStorage.getItem('eduguard_user'));

        if (!user || user.role !== 'student') {
            safeNavigate('index.html');
            document.getElementById('profile-name-sidebar').innerText = 'Guest (Preview)';
            document.getElementById('profile-avatar').innerText = 'G';
        } else {
            document.getElementById('profile-name-sidebar').innerText = user.name;
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();
            fetchResults();
        }

        async function fetchResults() {
            try {
                const exRes = await fetch(`${API_BASE}/exams`);
                const exams = await exRes.json();

                let allSubs = [];
                for (let ex of exams) {
                    const sRes = await fetch(`${API_BASE}/submissions/${ex._id}`);
                    const subs = await sRes.json();
                    const mySubs = subs.filter(s => s.studentId === user.id);
                    mySubs.forEach(s => s.examTitle = ex.title);
                    allSubs = [...allSubs, ...mySubs];
                }

                allSubs.sort((a, b) => new Date(b.date) - new Date(a.date));
                document.getElementById('res-body').innerHTML = allSubs.length === 0 ? `<tr><td colspan="4" class="p-10 text-center text-gray-500 font-medium">No past attempts.</td></tr>` : allSubs.map(res => {
                    let answeredCount = 0;
                    let unansweredCount = 0;

                    if (res.details && res.details.length > 0) {
                        res.details.forEach(d => {
                            if (d.studentAnswerIndex !== null && d.studentAnswerIndex !== undefined) {
                                answeredCount++;
                            } else {
                                unansweredCount++;
                            }
                        });
                    }

                    const submitDate = new Date(res.date).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    return `
                    <tr class="hover:bg-indigo-50/30">
                        <td class="p-6 font-black text-gray-900 text-xl">${res.examTitle}</td>
                        <td class="p-6 text-sm font-bold text-gray-600">${submitDate}</td>
                        <td class="p-6 text-center"><span class="px-4 py-2 rounded-xl text-sm font-black text-indigo-700 bg-indigo-50 border border-indigo-100">${answeredCount}</span></td>
                        <td class="p-6 text-center"><span class="px-4 py-2 rounded-xl text-sm font-black text-gray-600 bg-gray-100 border border-gray-200">${unansweredCount}</span></td>
                    </tr>
                `}).join('');
                lucide.createIcons();
            } catch (error) {
                showToast("Failed to connect to the backend server.");
            }
        }

        // Render static icons on page load
        lucide.createIcons();
    </script>
</body>

</html>
